<style>
:root{--navy:#1C2B3A;--navy2:#28394D;--gold:#C9931A;--paper:#F6F4EE;--card:#FFFFFF;--ink:#22252A;--line:#DDD8CC;--ok:#2E6B46;--bad:#B23A31;--mut:#6B7280}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--paper);color:var(--ink);line-height:1.55}
.wrap{max-width:880px;margin:0 auto;padding:28px 20px 80px}
header.bar{background:linear-gradient(180deg,#1C2B3A,#152230);color:#EDE8DC;padding:18px 22px;border-radius:10px;margin-bottom:22px}
header.bar .mono{font-family:Consolas,monospace;font-size:12px;letter-spacing:.14em;color:#C9B37E;text-transform:uppercase}
header.bar h1{font-size:21px;margin-top:4px;font-weight:600}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:22px 24px;margin-bottom:18px;box-shadow:0 2px 10px rgba(28,43,58,.06)}
.card h2{font-size:17px;color:var(--navy);margin-bottom:10px}
.sub{color:var(--mut);font-size:14px}
label{display:block;font-size:13px;font-weight:600;color:var(--navy);margin:12px 0 4px}
input,select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:7px;font:inherit;font-size:14.5px;background:#FDFCF9}
input:focus,select:focus{outline:2px solid var(--gold)}
button{font:inherit;cursor:pointer;border:none;border-radius:7px;padding:11px 20px;font-weight:600}
.btn{background:var(--navy);color:#fff}
.btn:hover{background:var(--navy2)}
.btn[disabled]{background:#9AA3AD;cursor:not-allowed}
.btn2{background:#EFEBE0;color:var(--navy);border:1px solid var(--line)}
.warn{background:#FBF6E7;border:1px solid #E4D5A9;border-radius:8px;padding:12px 14px;font-size:13.5px;margin:14px 0}
.danger{background:#FBEDEB;border-color:#E7C0BB}
.timerbar{position:sticky;top:0;z-index:50;background:var(--navy);color:#fff;border-radius:0 0 10px 10px;padding:10px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.timerbar b{font-family:Consolas,monospace;font-size:20px;letter-spacing:.06em}
.timerbar.low{background:var(--bad)}
.q{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:18px 20px;margin-bottom:14px}
.q .qt{font-weight:600;margin-bottom:10px}
.q .qn{color:var(--gold);font-family:Consolas,monospace;margin-right:6px}
.opt{display:flex;gap:10px;align-items:flex-start;padding:8px 10px;border:1px solid transparent;border-radius:7px;cursor:pointer;font-size:14.5px}
.opt:hover{background:#F4F1E8}
.opt input{width:auto;margin-top:4px}
.opt.sel{background:#EEF3EE;border-color:#BCD3C2}
.progress{font-size:13px;color:var(--mut)}
.codebox{font-family:Consolas,monospace;font-size:13px;background:#F1EEE5;border:1px dashed #BBB29B;border-radius:8px;padding:12px;word-break:break-all;margin:10px 0}
.big{font-size:30px;font-weight:700;color:var(--navy)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.grid2{grid-template-columns:1fr}}
footer{margin-top:26px;font-size:12.5px;color:var(--mut);border-top:1px solid var(--line);padding-top:14px}
a{color:var(--navy)}
.mono{font-family:Consolas,monospace}
</style>

/* ---------- completion codes (identical to index.html) ---------- */
function djb2(s){let h=5381;for(const ch of s){h=(((h<<5)+h)+ch.codePointAt(0))>>>0;}return h.toString(16).padStart(8,'0');}
function b64e(s){return btoa(unescape(encodeURIComponent(s))).replace(/=+$/,'');}
function b64d(s){return decodeURIComponent(escape(atob(s)));}
function makeCode(mode,label,score,total,id,name,secs,sec){
  const clean=v=>String(v).replace(/\|/g,'/').trim();
  const payload=[mode,label,score,total,clean(id),clean(name),new Date().toISOString().slice(0,16),secs,clean(sec||'')].join('|');
  return 'BC2-'+b64e(payload)+'-'+djb2(payload+SECRET);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtT(s){s=Math.max(0,Math.floor(s));const h=Math.floor(s/3600),m=Math.floor(s%3600/60),x=s%60;return (h?h+':':'')+String(m).padStart(h?2:1,'0')+':'+String(x).padStart(2,'0');}
function toLocalInputValue(d){const p=n=>String(n).padStart(2,'0');return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes());}

/* ---------- seeded shuffle so option order survives refresh ---------- */
function seedFrom(str){let h=2166136261;for(const c of str){h=(h^c.codePointAt(0))*16777619>>>0;}return h;}
function rng(seed){let s=seed>>>0;return function(){s=(s*1664525+1013904223)>>>0;return s/4294967296;};}
function seededOrder(n,seed){const a=[...Array(n).keys()];const r=rng(seed);for(let i=n-1;i>0;i--){const j=Math.floor(r()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

{q:"The strongest résumé bullets follow the pattern:",o:["Objective statements about career hopes","Duty listing — 'Responsible for various administrative tasks'","Action verb + task + measurable result — 'Cut intake errors 38% by redesigning the checklist'","Trait claims — 'Hardworking team player with great attitude'"]},
{q:"A tailored cover letter earns its space by:",o:["Connecting your specific evidence to THIS employer's specific need — not restating the résumé","Explaining every job change since graduation","Discussing salary expectations early","Repeating the résumé in paragraph form"]},
{q:"Employers who search a candidate's name should find:",o:["Whatever exists; employers rarely look","Only private, locked accounts","Nothing at all — invisibility is safest","A professional layer consistent with the application — the person online and on paper are colleagues"]},
{q:"Gaps or job changes on a résumé are best handled by:",o:["Adjusting dates so gaps disappear","Explaining them at length in the first interview minute","Leaving all dates off the résumé","Honest, brief framing focused on what was built or learned — never fabrication"]},
{q:"Networking outreach ('I'm exploring quality roles in medical devices — could I ask you two questions about your path?') works because it:",o:["Directly requests a job referral from a stranger","Makes a small, specific, answerable ask of someone positioned to help","Attaches a full résumé for forwarding","Flatters the recipient at length"]},
/* Ch14 */
{q:"The STAR structure for behavioral interview answers stands for:",o:["Skills, Training, Attitude, Reliability","Situation, Task, Action, Result","Strengths, Talents, Achievements, References","Story, Theme, Argument, Resolution"]},
{q:"The most common failure in STAR answers is:",o:["Describing the situation too specifically","Vague, collective actions — 'we handled it' — with no measurable result","Including a numeric result","Naming the employer where it happened"]},
{q:"Asking the interviewer 'What does success in this role look like at ninety days?' signals:",o:["That you didn't research the company","That you're worried about probation periods","That you're already thinking like someone doing the job","That you expect rapid promotion"]},
{q:"When salary comes up early in an interview, the professional response is:",o:["A calm range based on researched market data for the role and region","Asking what the interviewer personally earns","Refusing to discuss compensation at any stage","Naming the lowest number you'd accept"]},
{q:"The post-interview thank-you message is most effective when it:",o:["Arrives a week later so you seem unhurried","Arrives within a day and references a specific moment from the conversation","Restates your entire résumé","Is sent to every employee you met, identically worded"]},
{q:"If an interviewer asks a question that seems designed to elicit protected personal information, the composed response is to:",o:["Answer the legitimate concern beneath it — 'If you're asking about availability, my schedule fully covers the role's hours'","Answer completely to avoid awkwardness","End the interview immediately","Refuse loudly and cite statutes"]},
{q:"After a rejection, the highest-value professional move is:",o:["A demand for detailed feedback","Silence — the relationship is over","A gracious reply that thanks them and keeps the door open — plus a request for the next opening","A complaint to the hiring manager's supervisor"]},
/* Ch15 */
{q:"The governing rule for professional AI use in writing is:",o:["AI use must always be concealed","AI output needs checking only for spelling","Your name ships on it — the judgment, verification, and accountability stay yours","Whatever the tool produces may be sent as-is"]},
{q:"AI tools state falsehoods fluently and confidently. The professional consequence is:",o:["Confident phrasing signals accuracy","Verification is needed only for legal documents","Facts, numbers, names, and citations from AI get verified against real sources before use","AI should never be used for drafting"]},
{q:"Pasting confidential data (client names, unreleased figures) into a public AI tool is best understood as:",o:["Harmless, since chatbots forget conversations","A problem only for regulated industries","Acceptable if the account is password-protected","Disclosure to an external service — the same confidentiality rules as any outside party apply"]},
{q:"The message category where AI drafting defeats the entire purpose is:",o:["Personal goodwill — condolences and thanks, where the human pause IS the content","Technical documentation","Meeting agendas","Routine scheduling confirmations"]},
{q:"An AI agent that acts on your behalf (sending, scheduling, filing) differs from a drafting tool because:",o:["It cannot make errors","It requires no instructions","Its actions are yours the moment they execute — supervision and limits must be designed in advance","It removes your accountability"]},
{q:"The most durable communication skills as AI drafting becomes universal are:",o:["Vocabulary size","Memorized templates for every genre","Judgment: knowing what matters, what's true, and what the moment requires","Typing speed and formatting knowledge"]},
/* Ch16 */
{q:"In a crisis, the leader's first communication should:",o:["Route all questions to legal","Wait until every fact is confirmed","Arrive fast, own what's known and unknown, and promise a specific update cadence","Minimize the event to prevent panic"]},
{q:"Influence built by genuinely getting interested in other people's problems (the Carnegie principle) works because:",o:["People move for those who demonstrably understand and serve their interests","It avoids all disagreement","Flattery is universally effective","It creates debts people must repay"]},
{q:"'Talk in terms of the other person's interests' translates, in business writing, to:",o:["Avoiding your own recommendations","Mentioning the reader's hobbies in openings","The you-view: framing every message around the reader's stakes and gains","Agreeing with whatever the reader believes"]},
{q:"The leadership habit of admitting your own errors quickly and emphatically earns influence because:",o:["It transfers blame efficiently","It makes your praise credible and your standards livable — people follow what's real","It preempts formal discipline","It lowers expectations for everyone"]},
{q:"Under pressure, the leader's communication discipline of 'clarity over reassurance' means:",o:["Never offering comfort in hard moments","Sharing every fear you privately hold","People can act on accurate hard news; they can't act on comfortable fog","Delivering all news in writing only"]},
{q:"Letting the other person save face after an error — correcting privately, criticizing the act not the person — preserves:",o:["Your plausible deniability","Their capacity and willingness to keep contributing, which the team needs tomorrow","Seniority-based privilege","The illusion that nothing happened"]},
/* Ch17 */
{q:"In value-based strategy, a firm creates value by:",o:["Cutting prices below all competitors","Advertising more than rivals","Widening the gap between customers' willingness to pay and suppliers'/employees' willingness to sell","Maximizing the number of product features"]},
{q:"A proposal argues that new software 'raises customer willingness to pay by cutting their audit prep time.' This frames the purchase as:",o:["Value creation the buyer can verify — the strongest commercial argument available","A feature comparison against rivals","A discount negotiation","A cost the buyer must absorb"]},
{q:"'Willingness to sell' falls (creating value for employees) when a firm:",o:["Outsources the function entirely","Raises salaries across the board","Makes work genuinely better — flexibility, growth, meaning — so people would accept the job at lower total cost","Requires longer hours for the same pay"]},
{q:"The strategic insight that 'no' is never free means:",o:["The status quo has costs — a proposal's best paragraph often prices the do-nothing option","Rejecting proposals is always wrong","Budgets should never be cut","Every proposal deserves funding"]},
{q:"A communicator who understands the firm's strategy writes proposals that:",o:["Connect their ask to the value drivers leadership already cares about — WTP up or costs down","Avoid mentioning money entirely","Focus on their department's convenience","Are longer and more detailed than rivals'"]},
{q:"Value-based thinking treats price as:",o:["The only lever that matters","Fixed by industry convention","Irrelevant to strategy","A split of created value between parties — not the source of value itself"]},
];
const FINAL_KEY='MDAzMTMxMDEyMTIwMTIwMzEwMzAzMDEwMTEyMTAzMjAzMzExMTIwMTAyMjIzMDIyMjAyMTIxMjAyMDAz';(function(){const d=atob(FINAL_KEY);for(let i=0;i<FINAL.length;i++)FINAL[i].a=d.charCodeAt(i)-48;})();

/* ============================================================ */
const EXAMS={midterm:{label:"Midterm Exam",bank:MIDTERM,cover:"Chapters 1–8"},final:{label:"Final Exam",bank:FINAL,cover:"Chapters 9–17"}};
const app=document.getElementById('app');
const params=new URLSearchParams(location.search);

function header(title,sub){return '<header class="bar"><div class="mono">BADM 225 · Professional Communication for Business</div><h1>'+esc(title)+'</h1>'+(sub?'<div class="sub" style="color:#C6CDD6;margin-top:4px">'+esc(sub)+'</div>':'')+'</header>';}

/* ---------- instructor setup (no params) ---------- */
function renderSetup(){
  document.title='BADM 225 — Exam Setup (Instructor)';
  app.innerHTML=header('Timed Exam — Instructor Setup','Build a dated exam link to post in the LMS when you are ready.')+
  '<div class="card"><h2>1 · Configure</h2>'+
  '<div class="grid2"><div><label>Exam</label><select id="ex"><option value="midterm">Midterm (Ch 1–8, 60 questions)</option><option value="final">Final (Ch 9–17, 60 questions)</option></select></div>'+
  '<div><label>Time limit (minutes)</label><input id="dur" type="number" min="30" max="300" value="'+DEFAULT_MIN+'"></div></div>'+
  '<div class="grid2"><div><label>Opens (students cannot start before this)</label><input id="open" type="datetime-local"></div>'+
  '<div><label>Last start (latest a student may begin)</label><input id="last" type="datetime-local"></div></div>'+
  '<div class="sub" style="margin-top:8px">Each student gets the full time limit from the moment they press START, as long as they begin before "last start." Leave "last start" blank for a 24-hour window.</div>'+
  '<div style="margin-top:14px"><button class="btn" id="gen">GENERATE EXAM LINK</button></div>'+
  '<div id="out"></div></div>'+
  '<div class="card"><h2>How it works</h2><ul style="margin-left:18px;font-size:14px">'+
  '<li>Post the generated link in your LMS at exam time (or in advance — it will not open early).</li>'+
  '<li>60 multiple-choice questions; question and answer order are shuffled per student.</li>'+
  '<li>The timer runs from each student’s START; the exam auto-submits at zero. Progress auto-saves in the student’s browser, so a refresh does not lose answers or reset the clock.</li>'+
  '<li>On submit, students get a completion code (same BC2 format as homework) to paste into the LMS. Verify codes in the practice site’s Instructor tab — exams appear with mode EXAM.</li>'+
  '<li>FERPA: nothing students enter leaves their browser. No answer key is shown to students after submission.</li>'+
  '<li>Timing runs on the student’s device clock; the completion code embeds the actual date-time and seconds used, so anomalies are visible to you at verification.</li></ul></div>'+
  footerHTML();
  const now=new Date(Date.now()+3600e3); now.setMinutes(0,0,0);
  document.getElementById('open').value=toLocalInputValue(now);
  document.getElementById('gen').onclick=()=>{
    const ex=document.getElementById('ex').value, dur=parseInt(document.getElementById('dur').value)||DEFAULT_MIN;
    const open=document.getElementById('open').value; let last=document.getElementById('last').value;
    if(!open){alert('Set an opening time.');return;}
    if(!last) last=toLocalInputValue(new Date(new Date(open).getTime()+24*3600e3));
    const qs='e='+ex+'&t='+encodeURIComponent(open)+'&d='+dur+'&x='+encodeURIComponent(last);
    const sig=djb2(qs+SECRET);
    const url=location.origin+location.pathname+'?'+qs+'&sig='+sig;
    document.getElementById('out').innerHTML='<div class="codebox" id="lnk">'+esc(url)+'</div><button class="btn2" onclick="navigator.clipboard.writeText(document.getElementById(\'lnk\').textContent).then(()=>this.textContent=\'COPIED ✓\')">COPY LINK</button>'+
    '<div class="warn" style="margin-top:12px"><b>'+esc(EXAMS[ex].label)+'</b> · opens '+new Date(open).toLocaleString()+' · last start '+new Date(last).toLocaleString()+' · '+dur+' minutes per student.</div>';
  };
}

/* ---------- student flow ---------- */
function readConfig(){
  const e=params.get('e'),t=params.get('t'),d=params.get('d'),x=params.get('x'),sig=params.get('sig');
  if(!e||!t||!d||!x||!sig||!EXAMS[e]) return null;
  const qs='e='+e+'&t='+encodeURIComponent(t)+'&d='+d+'&x='+encodeURIComponent(x);
  if(djb2(qs+SECRET)!==sig) return {bad:true};
  return {exam:e,open:new Date(t),mins:Math.min(300,Math.max(10,parseInt(d)||DEFAULT_MIN)),last:new Date(x),sig};
}
const cfg=readConfig();
let CURRENT_KEY=null;
function studentKey(nm,sid){return 'bc_exam_'+cfg.exam+'_'+cfg.sig+'_'+seedFrom(nm.trim().toLowerCase()+'|'+sid.trim().toLowerCase()+'|'+cfg.sig);}
function sKey(){return CURRENT_KEY;}
function loadS(){if(!CURRENT_KEY)return null;try{return JSON.parse(localStorage.getItem(sKey()))||null;}catch(e){return null;}}
function saveS(s){if(!CURRENT_KEY)return;localStorage.setItem(sKey(),JSON.stringify(s));}
function footerHTML(){return '<footer><b>Privacy.</b> Nothing you enter on this page is uploaded or stored on any server. Your answers and identity stay in this browser; your score reaches your instructor only through the completion code you submit in the LMS. Original instructor-created material — not affiliated with any textbook or publisher.</footer>';}

function renderGate(){
  const E=EXAMS[cfg.exam];
  document.title='BADM 225 — '+E.label;
  const now=Date.now();
  const before=now<cfg.open.getTime(), after=now>cfg.last.getTime();
  app.innerHTML=header(E.label,E.cover+' · 60 multiple-choice questions · '+cfg.mins+' minutes')+
  '<div class="card"><h2>Exam window</h2><p style="font-size:15px">Opens: <b>'+cfg.open.toLocaleString()+'</b><br>Last start: <b>'+cfg.last.toLocaleString()+'</b><br>Time limit: <b>'+cfg.mins+' minutes</b> from when you press START.</p>'+
  (before?'<div class="warn">This exam has not opened yet. It opens in <b id="cd"></b>. This page will unlock automatically.</div>':'')+
  (after?'<div class="warn danger">The start window for this exam has closed. Contact your instructor.</div>':'')+
  '</div>'+
  '<div class="card"><h2>Before you start (or to resume)</h2>'+
  '<label>Full name</label><input id="nm" autocomplete="name" maxlength="60">'+
  '<label>Student ID</label><input id="sid" maxlength="30">'+
  '<label>Course / section</label><select id="sec"><option value="">— Select your section —</option>'+
  SECTIONS.map(s=>'<option value="'+esc(s)+'">'+esc(s)+'</option>').join('')+'</select>'+
  '<div class="warn">Rules: closed notes unless your instructor says otherwise · the timer does not pause · the exam submits itself when time expires · you may change answers any time before submitting · one attempt. If this page reloads, enter the SAME name and ID again to resume — this device may be shared with other students.</div>'+
  '<button class="btn" id="start" '+(before||after?'disabled':'')+'>START / RESUME EXAM</button></div>'+footerHTML();
  if(before){
    const cd=document.getElementById('cd');
    const iv=setInterval(()=>{const r=(cfg.open.getTime()-Date.now())/1000;if(r<=0){clearInterval(iv);renderGate();return;}cd.textContent=fmtT(r);},500);
    const r0=(cfg.open.getTime()-now)/1000; cd.textContent=fmtT(r0);
  }
  const btn=document.getElementById('start');
  if(btn) btn.onclick=()=>{
    const nm=document.getElementById('nm').value.trim(),sid=document.getElementById('sid').value.trim(),sec=document.getElementById('sec').value.trim();
    if(!nm||!sid||!sec){alert('Enter your name and student ID, and select your section.');return;}
    if(Date.now()<cfg.open.getTime()||Date.now()>cfg.last.getTime()){renderGate();return;}
    CURRENT_KEY=studentKey(nm,sid);
    const existing=loadS();
    if(existing&&existing.done){renderDone(existing);return;}
    if(existing&&existing.startedAt){renderExam();return;}
    const seed=seedFrom(nm+'|'+sid+'|'+cfg.sig);
    const qOrder=seededOrder(EXAMS[cfg.exam].bank.length,seed);
    const oOrders=qOrder.map((qi,k)=>seededOrder(4,seed+31*k+7));
    saveS({name:nm,id:sid,sec:sec,startedAt:Date.now(),qOrder,oOrders,ans:{},done:false});
    renderExam();
  };
}

let tick=null;
function deadline(st){return Math.min(st.startedAt+cfg.mins*60e3, cfg.last.getTime()+cfg.mins*60e3);}
function renderExam(){
  const E=EXAMS[cfg.exam], st=loadS();
  const bank=E.bank;
  let html=header(E.label,st.name+' · '+st.id+' · Section '+st.sec)+
  '<div class="timerbar" id="tb"><span>TIME REMAINING</span><b id="tm">--:--</b><span class="progress" id="pg"></span></div><div id="qs">';
  st.qOrder.forEach((qi,k)=>{
    const q=bank[qi], ord=st.oOrders[k];
    html+='<div class="q"><div class="qt"><span class="qn">'+(k+1)+'.</span>'+esc(q.q)+'</div>';
    ord.forEach(oi=>{
      const sel=st.ans[k]===oi?' sel':'';
      html+='<label class="opt'+sel+'"><input type="radio" name="q'+k+'" value="'+oi+'"'+(st.ans[k]===oi?' checked':'')+'> <span>'+esc(q.o[oi])+'</span></label>';
    });
    html+='</div>';
  });
  html+='</div><div class="card"><h2>Submit</h2><p class="sub">Check the unanswered count above before submitting. You cannot reopen the exam after submission.</p><button class="btn" id="sub">SUBMIT EXAM</button></div>'+footerHTML();
  app.innerHTML=html;
  document.getElementById('qs').addEventListener('change',ev=>{
    if(ev.target.name&&ev.target.name.startsWith('q')){
      const k=parseInt(ev.target.name.slice(1)); const s=loadS();
      s.ans[k]=parseInt(ev.target.value); saveS(s);
      document.querySelectorAll('[name='+ev.target.name+']').forEach(r=>r.closest('.opt').classList.toggle('sel',r.checked));
      updateProgress();
    }
  });
  document.getElementById('sub').onclick=()=>{const s=loadS();const un=s.qOrder.length-Object.keys(s.ans).length;
    if(!confirm(un?('You have '+un+' unanswered question'+(un>1?'s':'')+'. Submit anyway?'):'Submit your exam now?'))return; finishExam(false);};
  function updateProgress(){const s=loadS();document.getElementById('pg').textContent=Object.keys(s.ans).length+' / '+s.qOrder.length+' answered';}
  updateProgress();
  if(tick)clearInterval(tick);
  tick=setInterval(()=>{
    const rem=(deadline(st)-Date.now())/1000;
    const tm=document.getElementById('tm'); if(!tm){clearInterval(tick);return;}
    tm.textContent=fmtT(rem);
    if(rem<=300)document.getElementById('tb').classList.add('low');
    if(rem<=0){clearInterval(tick);finishExam(true);}
  },500);
}

function finishExam(auto){
  const st=loadS(); if(!st||st.done)return;
  const bank=EXAMS[cfg.exam].bank;
  let score=0;
  st.qOrder.forEach((qi,k)=>{if(st.ans[k]===bank[qi].a)score++;});
  const secs=Math.min(cfg.mins*60,Math.round((Date.now()-st.startedAt)/1000));
  const code=makeCode('EXAM',EXAMS[cfg.exam].label,score,bank.length,st.id,st.name,secs,st.sec);
  st.done=true;st.score=score;st.code=code;st.secs=secs;st.auto=!!auto;saveS(st);
  renderDone(st);
}
function renderDone(st){
  if(tick)clearInterval(tick);
  const E=EXAMS[cfg.exam];
  document.title='BADM 225 — '+E.label+' — Submitted';
  app.innerHTML=header(E.label+' — Submitted',st.name+' · Section '+st.sec)+
  '<div class="card"><h2>Your result</h2><div class="big">'+st.score+' / '+E.bank.length+'</div>'+
  '<p class="sub">Time used: '+fmtT(st.secs)+(st.auto?' · submitted automatically when time expired':'')+'</p>'+
  '<div class="warn">Copy the completion code below and paste it into the <b>'+esc(E.label)+'</b> assignment in the LMS. Your instructor verifies it there. Individual answers are not shown.</div>'+
  '<div class="codebox" id="code">'+esc(st.code)+'</div>'+
  '<button class="btn" onclick="navigator.clipboard.writeText(document.getElementById(\'code\').textContent).then(()=>this.textContent=\'COPIED ✓\')">COPY CODE</button></div>'+footerHTML();
}

/* ---------- route ---------- */
if(!cfg){renderSetup();}
else if(cfg.bad){app.innerHTML=header('Exam link invalid')+'<div class="card"><div class="warn danger">This exam link is invalid or has been altered. Ask your instructor for the correct link.</div></div>'+footerHTML();}
else{renderGate();}
</script>
</body>
</html>
