      s.deadline=Date.now()+mins*60000;
      render();
    }; return;
  }
  const total=s.qs.length;
  if(s.submitted){
    if(s.timer){clearInterval(s.timer);s.timer=null;}
    m.insertAdjacentHTML('beforeend', resultHtml('Quiz',s.score,total,s.code));
    s.qs.forEach((ref,qi)=>m.insertAdjacentHTML('beforeend',qBlock(DATA[ref.c].mc[ref.qi],qi,s.answers[qi],true,true)));
    wireCopy(m); return;
  }
  m.insertAdjacentHTML('beforeend','<div class="stickybar"><span class="timer" id="qtimer">--:--</span>'+
    '<span class="mono">QUIZ · '+esc(s.name)+' · ID '+esc(s.id)+'</span>'+
    '<span class="mono" id="qzcount">'+Object.keys(s.answers).length+' / '+total+' answered</span>'+
    '<button class="gobtn" id="qzsubmit">SUBMIT QUIZ</button></div>');
  s.qs.forEach((ref,qi)=>m.insertAdjacentHTML('beforeend',qBlock(DATA[ref.c].mc[ref.qi],qi,s.answers[qi],false,false)));
  m.querySelectorAll('.opt').forEach(b=>{ b.onclick=()=>{
    const qi=+b.dataset.q, oi=+b.dataset.o;
    s.answers[qi]=oi;
    const blk=document.getElementById('q'+qi);
    blk.querySelectorAll('.opt').forEach(o=>o.classList.remove('picked'));
    b.classList.add('picked');
    document.getElementById('qzcount').textContent=Object.keys(s.answers).length+' / '+total+' answered';
  };});
  function submit(){
    if(s.submitted) return;
    let sc=0; s.qs.forEach((ref,qi)=>{if(s.answers[qi]===DATA[ref.c].mc[ref.qi][2])sc++;});
    s.score=sc; s.submitted=true;
    const label=all?'ALL':'CH'+view.ch;
    const left=Math.max(0,Math.round((s.deadline-Date.now())/1000));
    s.code=makeCode('QZ',label,sc,total,s.id,s.name,(mins*60-left),s.sec);
    render(); window.scrollTo({top:0});
  }
  document.getElementById('qzsubmit').onclick=()=>{
    const un=total-Object.keys(s.answers).length;
    if(un>0 && !confirm(un+' unanswered question(s) will score zero. Submit now?')) return;
    submit();
  };
  function tick(){
    const left=Math.max(0,Math.round((s.deadline-Date.now())/1000));
    const el=document.getElementById('qtimer');
    if(el){el.textContent=fmtT(left); if(left<=60)el.classList.add('low');}
    if(left<=0){submit();}
  }
  if(s.timer) clearInterval(s.timer);
  s.timer=setInterval(tick,500); tick();
}

/* ---------- instructor: verification + gradebook ---------- */
const GBKEY='bc_gb_v1';
function gbLoad(){ try{ return JSON.parse(localStorage.getItem(GBKEY))||[] }catch(e){ return [] } }
function gbSave(a){ try{ localStorage.setItem(GBKEY,JSON.stringify(a)) }catch(e){ alert('Browser storage unavailable — gradebook could not be saved.') } }
function gbSections(){ const s={}; gbLoad().forEach(c=>{const v=verifyCode(c); if(v.ok) s[v.sec||'—']=1;}); return Object.keys(s).sort(); }
function gbData(filterSec){
  const rows={}, cols={};
  gbLoad().forEach(c=>{ const v=verifyCode(c); if(!v.ok) return;
    const sec=v.sec||'—';
    if(filterSec && filterSec!=='ALL' && sec!==filterSec) return;
    const col=v.mode+' '+v.label; cols[col]=1;
    const key=v.id+'|'+sec;
    if(!rows[key]) rows[key]={name:v.name,id:v.id,sec:sec,cells:{}};
    const pct=Math.round(+v.score/+v.total*100);
    const cur=rows[key].cells[col];
    if(!cur||pct>cur.pct) rows[key].cells[col]={pct:pct,raw:v.score+'/'+v.total};
  });
  const order=[]; for(let i=1;i<=16;i++)order.push('HW CH'+i); for(let i=1;i<=16;i++)order.push('QZ CH'+i); order.push('QZ ALL');
  const colList=order.filter(c=>cols[c]).concat(Object.keys(cols).filter(c=>order.indexOf(c)<0).sort());
  return {rows:Object.values(rows).sort((a,b)=>a.name.localeCompare(b.name)), cols:colList};
}
function drawGB(){
  const el=document.getElementById('gbout'); if(!el) return;
  const sel=document.getElementById('gbsec'); const f=sel?sel.value:'ALL';
  const gd=gbData(f);
  if(!gd.rows.length){ el.innerHTML='<p class="sub" style="margin-top:12px">No stored results'+(f!=='ALL'?' for this section':'')+' yet. Paste completion codes above and click ADD TO GRADEBOOK.</p>'; return; }
  let h='<div style="overflow-x:auto;margin-top:12px"><table class="vtable"><tr><th>STUDENT</th><th>ID</th><th>SECTION</th>'+gd.cols.map(c=>'<th>'+esc(c)+'</th>').join('')+'<th>AVG</th></tr>';
  gd.rows.forEach(r=>{
    const pcts=gd.cols.map(c=>r.cells[c]?r.cells[c].pct:null);
    const have=pcts.filter(p=>p!==null);
    const avg=have.length?Math.round(have.reduce((a,b)=>a+b,0)/have.length):null;
    h+='<tr><td>'+esc(r.name)+'</td><td>'+esc(r.id)+'</td><td>'+esc(r.sec)+'</td>'+
      pcts.map((p,i)=>'<td>'+(p===null?'—':p+'% <span style="color:var(--mut)">('+r.cells[gd.cols[i]].raw+')</span>')+'</td>').join('')+
      '<td><b>'+(avg===null?'—':avg+'%')+'</b></td></tr>';
  });
  h+='<tr><td colspan="3"><b>CLASS AVERAGE</b></td>'+gd.cols.map(c=>{
    const v=gd.rows.map(r=>r.cells[c]).filter(Boolean).map(x=>x.pct);
    return '<td><b>'+(v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length)+'%':'—')+'</b></td>';
  }).join('')+'<td></td></tr>';
  el.innerHTML=h+'</table></div>';
}
function renderInstructor(m){
  m.innerHTML=memoHead('Instructor tools — gradebook &amp; code verification','Instructor Tools',
   'Verify student completion codes and build a gradebook across all your sections. The gradebook is stored only in this browser on this computer — it is never uploaded anywhere. Export CSV backups for your records.');
  const secs=gbSections();
  const selStyle='font-family:ui-monospace,Consolas,Menlo,monospace;font-size:12px;padding:6px 8px;border:1px solid var(--line);background:var(--card);margin:0 10px 0 6px';
  m.insertAdjacentHTML('beforeend',
   '<div class="formcard" style="border-left-color:var(--navy)"><label>PASTE COMPLETION CODE(S) — ONE PER LINE</label>'+
   '<textarea id="vin" style="width:100%;min-height:110px;font-family:ui-monospace,Consolas,Menlo,monospace;font-size:12.5px;padding:10px;border:1px solid var(--line);background:#FCFAF5" placeholder="BC2-…"></textarea>'+
   '<button class="gobtn green" id="gaddbtn">ADD TO GRADEBOOK</button> <button class="gobtn" id="vbtn" style="margin-left:8px">VERIFY ONLY</button><div id="vout"></div></div>'+
   '<div class="memo" style="margin-top:22px"><h2 style="font-size:20px">Gradebook</h2>'+
   '<div class="bar" style="margin-top:12px"><span class="mono">SECTION:</span><select id="gbsec" style="'+selStyle+'">'+
   '<option value="ALL">All sections</option>'+secs.map(s=>'<option>'+esc(s)+'</option>').join('')+'</select>'+
   '<button class="reset" id="gbcsv">EXPORT CSV</button><button class="reset" id="gbclear" style="margin-left:8px;color:var(--proof)">CLEAR GRADEBOOK</button></div>'+
   '<div id="gbout"></div></div>'+
   '<div class="memo" style="margin-top:22px"><h2 style="font-size:20px">Setup &amp; privacy notes</h2><div class="rules"><ul>'+
   '<li><b>Change the secret.</b> Open this file and edit the <span class="mono">SECRET</span> constant near the top of the script before deploying. Codes are only verifiable against the same secret, which prevents students from generating codes on an unmodified copy.</li>'+
   '<li><b>FERPA posture.</b> This site is static: no server, no database, no analytics, no transmission. Names, IDs, answers, and scores exist only in the student\u2019s browser and vanish on reload. Grades enter your records solely through the LMS assignment where students paste their code \u2014 so all education records stay inside your institution\u2019s FERPA-covered systems. Consider having students use their university ID (not SSN or personal data) in the ID field.</li>'+
   '<li><b>The gradebook stays on your computer.</b> Entries you add above are saved only in this browser on this machine (localStorage) \u2014 the digital equivalent of a grade file on your desk; nothing is uploaded. Use your own computer, not a shared or public one, and export CSV backups \u2014 clearing browser data erases the gradebook.</li>'+
   '<li><b>Sections.</b> Students enter their Section/Class # when starting graded work; it is embedded in their completion code, so one gradebook cleanly separates every section you teach. Filter with the dropdown above.</li>'+
   '<li><b>Integrity limits, honestly stated.</b> Codes are tamper-evident (editing any digit invalidates them), but this is a client-side homework tool, not a proctored exam platform: a determined student could read the page source. Appropriate for low-stakes homework and practice quizzes; run high-stakes exams in the LMS.</li>'+
   '<li><b>Grading workflow.</b> Create one LMS text-entry assignment per homework/quiz. Students paste codes there; you paste batches here and click ADD TO GRADEBOOK. Duplicates are skipped automatically, and the best score per student per assignment is shown. Codes embed name, ID, section, score, total, date, and time-on-task.</li>'+
   '</ul></div></div>');
  document.getElementById('vbtn').onclick=()=>{
    const lines=document.getElementById('vin').value.split(/\n+/).map(s=>s.trim()).filter(Boolean);
    if(!lines.length){document.getElementById('vout').innerHTML='';return;}
    let h='<table class="vtable"><tr><th>STATUS</th><th>TYPE</th><th>SET</th><th>SCORE</th><th>NAME</th><th>ID</th><th>SECTION</th><th>DATE (UTC)</th><th>TIME</th></tr>';
    lines.forEach(c=>{
      const v=verifyCode(c);
      if(v.ok) h+='<tr><td class="vok">VALID ✓</td><td>'+esc(v.mode)+'</td><td>'+esc(v.label)+'</td><td>'+esc(v.score)+' / '+esc(v.total)+'</td><td>'+esc(v.name)+'</td><td>'+esc(v.id)+'</td><td>'+esc(v.sec||'—')+'</td><td>'+esc(v.when)+'</td><td>'+fmtT(+v.secs||0)+'</td></tr>';
      else h+='<tr><td class="vbad">INVALID ✗</td><td colspan="8">'+esc(c.slice(0,40))+'… — malformed or altered code</td></tr>';
    });
    document.getElementById('vout').innerHTML=h+'</table>';
  };
  document.getElementById('gaddbtn').onclick=()=>{
    const lines=document.getElementById('vin').value.split(/\n+/).map(s=>s.trim()).filter(Boolean);
    if(!lines.length){document.getElementById('vout').innerHTML='';return;}
    const store=gbLoad(); let added=0,dup=0,bad=0;
    lines.forEach(c=>{ const v=verifyCode(c); if(!v.ok){bad++;return;} if(store.indexOf(c)>=0){dup++;return;} store.push(c);added++; });
    gbSave(store);
    document.getElementById('vout').innerHTML='<p class="sub" style="margin-top:10px"><b>'+added+' added to gradebook</b> · '+dup+' duplicate(s) skipped · '+bad+' invalid.</p>';
    const sel=document.getElementById('gbsec'); const cur=sel.value;
    sel.innerHTML='<option value="ALL">All sections</option>'+gbSections().map(s=>'<option>'+esc(s)+'</option>').join('');
    sel.value=cur; if(sel.selectedIndex<0) sel.value='ALL';
    drawGB();
  };
  document.getElementById('gbsec').onchange=drawGB;
  document.getElementById('gbcsv').onclick=()=>{
    const f=document.getElementById('gbsec').value;
    const gd=gbData(f);
    if(!gd.rows.length){alert('Nothing to export yet.');return;}
    const q=s=>'"'+String(s).replace(/"/g,'""')+'"';
    const out=[['Name','ID','Section'].concat(gd.cols).concat(['Average']).map(q).join(',')];
    gd.rows.forEach(r=>{
      const pcts=gd.cols.map(c=>r.cells[c]?r.cells[c].pct:'');
      const have=pcts.filter(p=>p!=='');
      const avg=have.length?Math.round(have.reduce((a,b)=>a+b,0)/have.length):'';
      out.push([r.name,r.id,r.sec].concat(pcts).concat([avg]).map(q).join(','));
    });
    const blob=new Blob([out.join('\r\n')],{type:'text/csv'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='badm225-gradebook'+(f!=='ALL'?'-'+f.replace(/[^A-Za-z0-9-]/g,'_'):'')+'.csv'; a.click();
  };
  document.getElementById('gbclear').onclick=()=>{
    if(!confirm('Delete ALL stored gradebook entries from this browser? Export a CSV first if you need a record.')) return;
    localStorage.removeItem(GBKEY); renderInstructor(m);
  };
  drawGB();
}

/* ---------- top-level render ---------- */
function wireCopy(m){ m.querySelectorAll('.copybtn').forEach(b=>b.onclick=()=>copyText(b.dataset.code,b)); }
function render(){
  buildNav();
  const m=document.getElementById('main');
  if(view.kind==='instructor'){ renderInstructor(m); return; }
  if(view.kind==='career'){
    m.innerHTML=memoHead('Professional development — instructor presentations','Professional Development',
     'Presentations created by your instructor on careers, leadership, influence, and workplace life — the practical side of professional communication. All original instructor material. Click any title to download the PowerPoint.');
    let h='';
    CAREER.forEach(c=>{
      h+='<div class="wr" style="margin-top:14px"><div class="tag mono">'+c[3]+' SLIDES · PPTX</div>'+
       '<h3 style="margin-top:4px"><a href="slides/career/'+c[0]+'" download style="color:var(--navy)">'+c[1]+'</a></h3>'+
       '<p class="sub" style="margin-top:4px">'+c[2]+'</p>'+
       '<a class="mono" href="slides/career/'+c[0]+'" download style="color:var(--navy);font-size:12px">⬇ DOWNLOAD</a></div>';
    });
    m.insertAdjacentHTML('beforeend',h+'<footer><b>About this series.</b> These presentations are the instructor’s own original work, shared for students in this course. They are not affiliated with any textbook or publisher.</footer>');
    return;
  }
  if(view.kind==='quizAll'){
    m.innerHTML=memoHead('Comprehensive quiz — all chapters','Comprehensive Quiz','Twenty questions drawn at random from every chapter bank. '+ALL_MIN+'-minute limit.');
    renderQuiz(m); return;
  }
  const d=DATA[view.ch];
  const modeNames={practice:'Practice questions',homework:'Graded homework',quiz:'Timed quiz'};
  m.innerHTML=memoHead(modeNames[view.mode]+' — Chapter '+view.ch,'Chapter '+view.ch+': '+d.t,d.sub);
  m.insertAdjacentHTML('beforeend',tabsHtml(view.mode));
  if(SLIDES[view.ch]) m.insertAdjacentHTML('beforeend','<p class="mono" style="margin:12px 0 0"><a href="'+SLIDES[view.ch]+'" download style="color:var(--navy)">⬇ DOWNLOAD CHAPTER '+view.ch+' LECTURE SLIDES (POWERPOINT)</a></p>');
  m.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{view.mode=t.dataset.m;render();window.scrollTo({top:0});});
  if(view.mode==='practice') renderPractice(m,d);
  else if(view.mode==='homework') renderHomework(m,d);
  else renderQuiz(m);
  m.insertAdjacentHTML('beforeend','<footer><b>About this practice set.</b> All questions and model guidance are original material written by the instructor as supplemental practice for BADM 225. This is not an official University of North Dakota website, and it is not affiliated with, and does not reproduce content from, any textbook or publisher. Nothing you enter is uploaded or stored; scores reach your instructor only via completion codes submitted in the LMS.</footer>');
  wireCopy(m);
}
render();
